services:
  - type: web
    name: donation-management-api
    runtime: python
    repo: https://github.com/chandrashekharddev/DonationManagement-Backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
