services:
  - type: web
    name: donation-management-api
    runtime: python
    repo: https://github.com/chandrashekharddev/DonationManagement-Backend
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: python render_start.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
